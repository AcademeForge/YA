<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AcademeForge Notes</title>
<style>
:root{
--bg:#08111f;--card:#111827;--card2:#1f2937;--text:#fff;--border:rgba(255,255,255,.08);
}
[data-theme="light"]{
--bg:#f8fafc;--card:#fff;--card2:#eef2f7;--text:#0f172a;--border:rgba(0,0,0,.08);
}
*{box-sizing:border-box}
body{
margin:0;font-family:Inter,Arial,sans-serif;
background:linear-gradient(135deg,#08111f,#0f172a);
color:var(--text);
min-height:100vh;
}
[data-theme="light"] body{background:#f8fafc}
.container{max-width:1200px;margin:auto;padding:24px}
.header{
display:flex;justify-content:space-between;align-items:center;
margin-bottom:24px;gap:12px;flex-wrap:wrap;
}
.left-actions{display:flex;gap:12px}
.btn{
border:none;cursor:pointer;padding:12px 18px;border-radius:14px;
font-weight:700;background:var(--card);color:var(--text);
}
.primary{
background:linear-gradient(135deg,#22c55e,#16a34a);color:white;
}
.hero{
background:var(--card);
border:1px solid var(--border);
padding:28px;border-radius:24px;margin-bottom:24px;
text-align:center;
}
.hero h1{margin:0 0 8px}
.hero p{opacity:.8}
.controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}
.card{
background:var(--card);
border:1px solid var(--border);
border-radius:22px;
padding:20px;
}
select{
width:100%;height:54px;border:none;border-radius:14px;
background:var(--card2);color:var(--text);padding:0 14px;
}
iframe{
width:100%;height:75vh;border:none;border-radius:20px;background:white;
}
@media(max-width:768px){
.controls{grid-template-columns:1fr}
.hero{text-align:left}
}
</style>
</head>
<body>
<div class="container">

<div class="header">
<div class="left-actions">
<button class="btn" onclick="goBack()">← Back</button>
</div>
<button class="btn" id="themeBtn">🌙 Dark / Light</button>
</div>

<div class="hero">
<h1>📚 AcademeForge Notes</h1>
<p>Select your class and subject to open notes instantly.</p>
</div>

<div class="controls">
<div class="card">
<h3>Select Class</h3>
<select id="afnxClassSelect">
<option value="">Choose Class</option>
</select>
</div>

<div class="card">
<h3>Select Subject</h3>
<select id="afnxSubjectSelect">
<option value="">Choose Subject</option>
</select>
</div>
</div>

<div class="card" style="margin-top:20px">
<h3 id="afnxCurrentNoteTitle">Select Class & Subject</h3>
</div>

<div style="margin-top:20px">
<iframe id="afnxNotesViewer" allowfullscreen></iframe>
</div>

</div>

<script>
const AFNX_BASE_URL="https://afooyyydhlwngzssgqih.supabase.co/functions/v1";

function goBack(){
 window.location.href="../settings.html";
}

const themeBtn=document.getElementById("themeBtn");
const savedTheme=localStorage.getItem("af_notes_theme")||"dark";
document.documentElement.setAttribute("data-theme",savedTheme);

themeBtn.onclick=()=>{
 const current=document.documentElement.getAttribute("data-theme");
 const next=current==="dark"?"light":"dark";
 document.documentElement.setAttribute("data-theme",next);
 localStorage.setItem("af_notes_theme",next);
};

async function loadClasses(){
 try{
 const res=await fetch(`${AFNX_BASE_URL}/afnx-notes-meta`);
 const data=await res.json();
 const select=document.getElementById("afnxClassSelect");
 (data.classes||[]).forEach(item=>{
 select.innerHTML+=`<option value="${item.id}">${item.name}</option>`;
 });
 }catch(e){console.error(e);}
}

document.getElementById("afnxClassSelect").addEventListener("change",async function(){
 try{
 const res=await fetch(`${AFNX_BASE_URL}/afnx-subjects?class=${this.value}`);
 const data=await res.json();

 const subject=document.getElementById("afnxSubjectSelect");
 subject.innerHTML='<option value="">Choose Subject</option>';

 (data.subjects||[]).forEach(item=>{
 subject.innerHTML+=`<option value="${item.id}">${item.name}</option>`;
 });
 }catch(e){console.error(e);}
});

document.getElementById("afnxSubjectSelect").addEventListener("change",async function(){
 try{
 const classId=document.getElementById("afnxClassSelect").value;

 const res=await fetch(`${AFNX_BASE_URL}/afnx-notes`,{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify({classId,subjectId:this.value})
 });

 const data=await res.json();

 document.getElementById("afnxCurrentNoteTitle").textContent=data.title||"Notes";
 document.getElementById("afnxNotesViewer").src=data.embed_url||"";
 }catch(e){console.error(e);}
});

loadClasses();
</script>
</body>
</html>
