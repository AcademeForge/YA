<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AcademeForge • Offline</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,
body{
  width:100%;
  min-height:100%;
  font-family:Inter,Segoe UI,Arial,sans-serif;
  background:
    radial-gradient(circle at top,
      rgba(79,70,229,.12),
      transparent 35%),
    radial-gradient(circle at bottom right,
      rgba(37,99,235,.10),
      transparent 30%),
    linear-gradient(
      180deg,
      #f8fbff 0%,
      #eef4ff 100%
    );
  color:#0f172a;
}

body{
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.offline-card{
  width:100%;
  max-width:380px;
  text-align:center;
  background:rgba(255,255,255,.96);
  border:1px solid rgba(226,232,240,.9);
  border-radius:32px;
  padding:32px 24px 26px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:
    0 25px 60px rgba(15,23,42,.12),
    0 10px 24px rgba(15,23,42,.08);
}

.status-pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px 14px;
  border-radius:999px;
  background:rgba(239,68,68,.10);
  border:1px solid rgba(239,68,68,.18);
  color:#dc2626;
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
  margin-bottom:18px;
}

.emoji{
  width:88px;
  height:88px;
  margin:0 auto 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  border-radius:28px;
  background:
    linear-gradient(
      135deg,
      rgba(239,68,68,.12),
      rgba(255,255,255,.95)
    );
  border:1px solid rgba(239,68,68,.15);
  box-shadow:
    0 15px 35px rgba(239,68,68,.12);
}

h1{
  font-size:30px;
  font-weight:900;
  line-height:1.05;
  letter-spacing:-0.04em;
  margin-bottom:12px;
  color:#0f172a;
}

p{
  font-size:15px;
  line-height:1.7;
  color:#64748b;
  font-weight:600;
  margin-bottom:24px;
}

button{
  width:100%;
  height:50px;
  border:none;
  outline:none;
  cursor:pointer;
  border-radius:18px;
  background:
    linear-gradient(
      135deg,
      #2563eb,
      #4f46e5
    );
  color:#fff;
  font-size:15px;
  font-weight:900;
  transition:
    transform .15s ease,
    box-shadow .15s ease;
  box-shadow:
    0 14px 30px rgba(37,99,235,.25);
}

button:hover{
  transform:translateY(-1px);
}

button:active{
  transform:scale(.98);
}

.divider{
  width:100%;
  height:1px;
  margin:20px 0 16px;
  background:
    linear-gradient(
      90deg,
      transparent,
      rgba(148,163,184,.35),
      transparent
    );
}

small{
  display:block;
  color:#94a3b8;
  font-size:12px;
  font-weight:800;
  letter-spacing:.03em;
}

.brand{
  color:#4f46e5;
}
</style>
</head>

<body>

<div class="offline-card">

  <div class="status-pill">
    ⚠ OFFLINE MODE
  </div>

  <div class="emoji">
    📡
  </div>

  <h1>Connection Lost</h1>

  <p>
    AcademeForge couldn't connect to the internet.
    <br>
    Please check your network connection and try again.
  </p>

  <button onclick="window.location.reload()">
    Retry Connection
  </button>

  <div class="divider"></div>

  <small>
    <span class="brand">AcademeForge</span>
    • Learning Beyond The Classroom
  </small>

</div>

</body>
</html>
