<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Internet</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.10), transparent 34%),
        linear-gradient(180deg, #f8fbff, #eef4ff);
      color: #0f172a;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .offline-card {
      width: 100%;
      max-width: 360px;
      text-align: center;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 28px;
      padding: 30px 20px 24px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
    }

    .emoji {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      font-size: 34px;
      background: linear-gradient(135deg, #fee2e2, #ffffff);
      border: 1px solid #fecaca;
      box-shadow: 0 14px 28px rgba(239, 68, 68, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 25px;
      line-height: 1.1;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #0f172a;
    }

    p {
      margin: 0 0 20px;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 600;
      color: #64748b;
    }

    button {
      width: 100%;
      height: 46px;
      border: 0;
      outline: none;
      border-radius: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      color: #ffffff;
      font-size: 14px;
      font-weight: 850;
      box-shadow: 0 14px 26px rgba(37, 99, 235, 0.22);
    }

    button:active {
      transform: scale(0.98);
    }

    small {
      display: block;
      margin-top: 14px;
      font-size: 11px;
      line-height: 1.4;
      color: #94a3b8;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <div class="offline-card">
    <div class="emoji">⚠️</div>

    <h1>Oops 😬</h1>

    <p>No internet connection.<br>Please connect to the internet and try again.</p>

    <button onclick="window.location.href='./'">Try Again</button>

    <small>AcademeForge</small>
  </div>
</body>
</html>
